<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>can't wait countdown</title>

<link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🎁</text></svg>">

<style>
/* === EXISTING STYLES مختصرة === */
body {
  margin:0;
  min-height:100vh;
  font-family: Arial;
  background: linear-gradient(135deg,#fff0f6,#ffe4ec);
  overflow:hidden;
}

/* === BALLOONS === */
.balloon {
  position: absolute;
  bottom: -100px;
  width: 40px;
  height: 50px;
  border-radius: 50%;
  animation: floatUp 6s linear infinite;
}

@keyframes floatUp {
  0% { transform: translateY(0); opacity:0; }
  10% { opacity:1; }
  100% { transform: translateY(-120vh); opacity:0; }
}

/* === FADE CINEMATIC === */
.fade-overlay {
  position: fixed;
  inset:0;
  background: black;
  opacity:0;
  pointer-events:none;
  transition: opacity 1s ease;
  z-index: 999;
}

.fade-overlay.active {
  opacity: 0.7;
}

/* === GIFT === */
.gift {
  width:200px;
  height:200px;
  background:#ff4f87;
  margin:auto;
  margin-top:20vh;
  display:flex;
  align-items:center;
  justify-content:center;
  cursor:pointer;
  border-radius:20px;
  transition: transform .6s ease;
}

.gift.open {
  transform: scale(1.2);
}

/* === CONTENT === */
.hidden-content {
  opacity:0;
  transform: translateY(30px);
  transition: all 1s ease;
  text-align:center;
}

.hidden-content.show {
  opacity:1;
  transform: translateY(0);
}

video {
  width:300px;
  border-radius:12px;
  margin-top:10px;
}
</style>
</head>

<body>

<div class="fade-overlay" id="fade"></div>

<h2 id="countdown" style="text-align:center;margin-top:40px;"></h2>

<div class="gift" id="gift">
🎁
</div>

<div class="hidden-content" id="content">
  <h2>message place</h2>

  <video id="video" controls preload="auto">
    <source src="bb.mp4" type="video/mp4">
  </video>
</div>

<audio id="sound">
  <source src="https://www.soundjay.com/misc/sounds/bell-ringing-05.mp3">
</audio>

<script>
// ===== COUNTDOWN =====
const targetDate = new Date("2026-03-25T00:00:00");
const countdownEl = document.getElementById("countdown");
let finished = false;

function updateCountdown() {
  const now = new Date();
  const diff = targetDate - now;

  if (diff <= 0) {
    finished = true;
    countdownEl.innerText = "اضغط على الهدية 🎁";
    return;
  }

  const s = Math.floor(diff / 1000) % 60;
  const m = Math.floor(diff / 60000) % 60;
  const h = Math.floor(diff / 3600000) % 24;
  const d = Math.floor(diff / 86400000);

  countdownEl.innerText = `${d}d ${h}h ${m}m ${s}s`;
}

setInterval(updateCountdown,1000);
updateCountdown();

// ===== BALLOONS =====
function createBalloons() {
  const colors = ["#ff4f87","#ffd166","#7dd3fc","#c084fc","#86efac"];
  for(let i=0;i<20;i++){
    const b = document.createElement("div");
    b.className="balloon";
    b.style.left=Math.random()*100+"%";
    b.style.background=colors[i%colors.length];
    b.style.animationDelay=Math.random()*3+"s";
    document.body.appendChild(b);
  }
}

// ===== CLICK =====
const gift = document.getElementById("gift");
const content = document.getElementById("content");
const video = document.getElementById("video");
const sound = document.getElementById("sound");
const fade = document.getElementById("fade");

gift.addEventListener("click", () => {
  if (!finished) return;

  gift.classList.add("open");

  // cinematic fade
  fade.classList.add("active");

  setTimeout(() => {
    fade.classList.remove("active");
  },1200);

  // show content
  content.classList.add("show");

  // balloons
  createBalloons();

  // sound
  sound.play();

  // play video
  video.play();
});

// preload video
window.addEventListener("load",()=>{
  video.load();
});
</script>

</body>
</html>
